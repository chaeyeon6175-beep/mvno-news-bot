name: Daily News Clipping

on:
  schedule:
    - cron: '0 0 * * *' # 매일 아침 9시(한국 시간)
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Script
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DB_ID_MNO: ${{ secrets.DB_ID_MNO }}
          DB_ID_SUBSID: ${{ secrets.DB_ID_SUBSID }}
          DB_ID_FIN: ${{ secrets.DB_ID_FIN }}
          DB_ID_SMALL: ${{ secrets.DB_ID_SMALL }}
        # [핵심 수정] .py 파일을 자동으로 찾아서 실행합니다.
        run: |
          PYTHON_FILE=$(find . -maxdepth 1 -name "*.py" | head -n 1)
          if [ -z "$PYTHON_FILE" ]; then
            echo "❌ 에러: 파이썬 파일을 찾을 수 없습니다. 레포지토리에 .py 파일이 있는지 확인하세요."
            exit 1
          fi
          echo "🚀 실행 중인 파일: $PYTHON_FILE"
          python "$PYTHON_FILE"
